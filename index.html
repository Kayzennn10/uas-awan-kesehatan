<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Screening | Prediksi Jantung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-white shadow-md py-4">
        <div class="max-w-6xl mx-auto px-4 flex items-center gap-4">
            <img src="https://via.placeholder.com/50?text=GCP+Logo" alt="Logo GCP" class="h-10 w-10 object-cover rounded-full border-2 border-blue-500">
            <h1 class="text-2xl font-bold text-blue-600">MediCare AI Screening</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 px-4 mb-12">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <div class="mb-6 border-b pb-4">
                <h2 class="text-xl font-bold text-gray-800">Formulir Indikator Kesehatan</h2>
                <p class="text-sm text-gray-500">Masukkan data klinis pasien untuk dianalisis oleh AI Engine.</p>
            </div>

            <form id="prediksiForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="block text-sm font-semibold mb-1">Umur</label><input type="number" id="age" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Jenis Kelamin (1=Pria, 0=Wanita)</label><input type="number" id="sex" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Tipe Nyeri Dada (cp: 0-3)</label><input type="number" id="cp" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Tekanan Darah (trestbps)</label><input type="number" id="trestbps" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Kolesterol (chol)</label><input type="number" id="chol" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Gula Darah Puasa (fbs: 1=>120, 0=<120)</label><input type="number" id="fbs" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Hasil EKG (restecg: 0-2)</label><input type="number" id="restecg" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Detak Jantung Maksimal (thalach)</label><input type="number" id="thalach" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Angina Induksi Olahraga (exang: 1=Ya, 0=Tidak)</label><input type="number" id="exang" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">ST Depression (oldpeak)</label><input type="number" step="0.1" id="oldpeak" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Kemiringan ST Segment (slope: 0-2)</label><input type="number" id="slope" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Jumlah Pembuluh Darah (ca: 0-4)</label><input type="number" id="ca" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">Thalassemia (thal: 0-3)</label><input type="number" id="thal" required class="w-1/2 border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                
                <div class="md:col-span-2 mt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                        Jalankan Analisis AI
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('prediksiForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Mencegah web reload

            // 1. Ambil semua nilai dari form dan ubah jadi Float (Sesuai kontrak Pydantic Azka)
            const payload = {
                age: parseFloat(document.getElementById('age').value),
                sex: parseFloat(document.getElementById('sex').value),
                cp: parseFloat(document.getElementById('cp').value),
                trestbps: parseFloat(document.getElementById('trestbps').value),
                chol: parseFloat(document.getElementById('chol').value),
                fbs: parseFloat(document.getElementById('fbs').value),
                restecg: parseFloat(document.getElementById('restecg').value),
                thalach: parseFloat(document.getElementById('thalach').value),
                exang: parseFloat(document.getElementById('exang').value),
                oldpeak: parseFloat(document.getElementById('oldpeak').value),
                slope: parseFloat(document.getElementById('slope').value),
                ca: parseFloat(document.getElementById('ca').value),
                thal: parseFloat(document.getElementById('thal').value)
            };

            // Loading state
            Swal.fire({ title: 'Memproses Data...', text: 'AI sedang menganalisis indikator', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                // 2. Tembak ke API lokal Azka (Nanti ganti URL ini kalau Backend sudah naik ke AWS)
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                // 3. Tampilkan hasil prediksi
                if(result.kode_hasil === 1) {
                    Swal.fire('Peringatan Medis!', result.status_prediksi, 'error');
                } else {
                    Swal.fire('Hasil Normal', result.status_prediksi, 'success');
                }

            } catch (error) {
                Swal.fire('Koneksi Gagal', 'Pastikan API Backend Azka sudah berjalan (uvicorn main:app --reload)', 'error');
            }
        });
    </script>
</body>
</html>
