<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Skrining | MediCare AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS khusus agar saat di-print (Cetak PDF), tampilannya rapi */
        @media print {
            body * { visibility: hidden; }
            #cetakArea, #cetakArea * { visibility: visible; }
            #cetakArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-white shadow-md py-4 no-print">
        <div class="max-w-4xl mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-heart-pulse text-blue-600 text-3xl"></i>
                <h1 class="text-2xl font-bold text-blue-600">MediCare AI</h1>
            </div>
            <a href="index.html" class="text-gray-500 hover:text-blue-600 font-semibold transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Beranda
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 px-4 mb-12" id="cetakArea">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <div class="mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-file-medical text-blue-500 mr-2"></i> Formulir Indikator Kesehatan</h2>
                <p class="text-sm text-gray-500 mt-1">Masukkan data klinis pasien dengan teliti untuk dianalisis oleh AI Engine.</p>
            </div>

            <form id="prediksiForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="block text-sm font-semibold mb-1">Umur</label><input type="number" id="age" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Jenis Kelamin (1=Pria, 0=Wanita)</label><input type="number" id="sex" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Tipe Nyeri Dada (cp: 0-3)</label><input type="number" id="cp" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Tekanan Darah (trestbps)</label><input type="number" id="trestbps" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Kolesterol (chol)</label><input type="number" id="chol" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Gula Darah Puasa (fbs: 1=>120, 0=<120)</label><input type="number" id="fbs" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Hasil EKG (restecg: 0-2)</label><input type="number" id="restecg" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Detak Jantung Maksimal (thalach)</label><input type="number" id="thalach" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Angina Induksi Olahraga (exang: 1=Ya, 0=Tidak)</label><input type="number" id="exang" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">ST Depression (oldpeak)</label><input type="number" step="0.1" id="oldpeak" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Kemiringan ST Segment (slope: 0-2)</label><input type="number" id="slope" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-sm font-semibold mb-1">Jumlah Pembuluh Darah (ca: 0-4)</label><input type="number" id="ca" required class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">Thalassemia (thal: 0-3)</label><input type="number" id="thal" required class="w-1/2 border rounded-lg p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                
                <div class="md:col-span-2 mt-4 p-5 bg-blue-50 rounded-lg border border-blue-200 no-print">
                    <h3 class="text-sm font-semibold mb-3 text-blue-800"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload Berkas Medis (Cloudinary)</h3>
                    <div class="flex flex-col sm:flex-row items-center gap-3">
                        <input type="file" id="fileInput" accept="image/*" class="w-full sm:w-auto text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
                        <button type="button" onclick="uploadKeCloudinary()" class="w-full sm:w-auto bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 px-6 rounded-full transition duration-200">
                            Upload ke Cloud
                        </button>
                    </div>
                    <p id="statusUpload" class="text-xs text-blue-600 mt-3 font-medium"></p>
                </div>
                
                <div class="md:col-span-2 mt-4 bg-yellow-50 p-4 rounded-lg border border-yellow-200 no-print">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="disclaimerCheck" class="mt-1 w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                        <span class="text-sm text-gray-700">
                            <b>Persetujuan Medis:</b> Saya mengerti bahwa hasil dari sistem ini dihasilkan oleh Kecerdasan Buatan (AI) murni sebagai skrining awal dan <b>bukan diagnosis medis pasti</b>.
                        </span>
                    </label>
                </div>

                <div class="md:col-span-2 mt-2 no-print">
                    <button type="submit" id="btnSubmit" class="w-full flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-lg transition duration-200 text-lg shadow-lg">
                        <i class="fa-solid fa-microchip"></i> <span>Jalankan Analisis AI</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // ==========================================
        // FUNGSI 1: UPLOAD GAMBAR KE CLOUDINARY (Tidak Diubah)
        // ==========================================
        async function uploadKeCloudinary() {
            const inputElemen = document.getElementById('fileInput');
            const fileGambar = inputElemen.files[0];
            const statusTeks = document.getElementById('statusUpload');

            if (!fileGambar) {
                Swal.fire('Perhatian', 'Silakan pilih gambar medis terlebih dahulu!', 'warning');
                return;
            }

            statusTeks.innerText = "Sedang mengunggah ke Cloudinary... Mohon tunggu.";
            
            const formData = new FormData();
            formData.append("file", fileGambar);
            formData.append("upload_preset", "xzy123"); 

            try {
                const response = await fetch("https://api.cloudinary.com/v1_1/dfdk6cph2/image/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (data.secure_url) {
                    statusTeks.innerHTML = `Sukses! File tersimpan di Cloudinary. <a href="${data.secure_url}" target="_blank" class="underline text-blue-800 font-bold">Lihat Gambar</a>`;
                    Swal.fire({ title: 'Upload Berhasil!', text: 'Berkas medis telah diamankan di Object Storage.', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                } else {
                    statusTeks.innerText = "Gagal mengunggah file.";
                    Swal.fire('Error', 'Gagal mengunggah gambar ke Cloud.', 'error');
                }
            } catch (error) {
                statusTeks.innerText = "Terjadi kesalahan sistem.";
            }
        }

        // ==========================================
        // FUNGSI 2: PREDIKSI AI KE BACKEND AWS (Diperbarui)
        // ==========================================
        document.getElementById('prediksiForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            // Validasi Persetujuan Medis
            const isChecked = document.getElementById('disclaimerCheck').checked;
            if (!isChecked) {
                Swal.fire({ icon: 'warning', title: 'Persetujuan Diperlukan', text: 'Harap centang kotak persetujuan medis sebelum melanjutkan.' });
                return;
            }

            // Ubah Tombol Jadi Loading
            const btnSubmit = document.getElementById('btnSubmit');
            const originalBtnHtml = btnSubmit.innerHTML;
            btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> <span>AI Sedang Menganalisis...</span>`;
            btnSubmit.disabled = true;
            btnSubmit.classList.replace('bg-blue-600', 'bg-gray-400');

            const payload = {
                age: parseFloat(document.getElementById('age').value),
                sex: parseFloat(document.getElementById('sex').value),
                cp: parseFloat(document.getElementById('cp').value),
                trestbps: parseFloat(document.getElementById('trestbps').value),
                chol: parseFloat(document.getElementById('chol').value),
                fbs: parseFloat(document.getElementById('fbs').value),
                restecg: parseFloat(document.getElementById('restecg').value),
                thalach: parseFloat(document.getElementById('thalach').value),
                exang: parseFloat(document.getElementById('exang').value),
                oldpeak: parseFloat(document.getElementById('oldpeak').value),
                slope: parseFloat(document.getElementById('slope').value),
                ca: parseFloat(document.getElementById('ca').value),
                thal: parseFloat(document.getElementById('thal').value)
            };

            try {
                // Tembak ke API AWS
                const response = await fetch('http://54.179.236.97:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                // Tampilkan Hasil dengan Rekomendasi Medis & Tombol Print
                if(result.kode_hasil === 1) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Risiko Tinggi Penyakit Jantung',
                        html: `<div class="text-left mt-3"><b>Diagnosis AI:</b> ${result.status_prediksi}<br><br><b>Rekomendasi Tindakan:</b><br>1. Segera jadwalkan konsultasi dengan Kardiolog.<br>2. Bawa hasil EKG dan tes darah Anda.<br>3. Hindari aktivitas fisik berat untuk sementara waktu.</div>`,
                        confirmButtonColor: '#d33',
                        showCancelButton: true,
                        cancelButtonText: 'Tutup',
                        confirmButtonText: '<i class="fa-solid fa-print"></i> Cetak Laporan'
                    }).then((res) => { if (res.isConfirmed) window.print(); });
                } else {
                    Swal.fire({
                        icon: 'success',
                        title: 'Hasil Skrining Normal',
                        html: `<div class="text-left mt-3"><b>Diagnosis AI:</b> ${result.status_prediksi}<br><br><b>Rekomendasi Tindakan:</b><br>1. Jantung Anda terindikasi sehat.<br>2. Tetap jaga pola makan bergizi.<br>3. Rutin berolahraga ringan dan kelola stres.</div>`,
                        confirmButtonColor: '#2563eb',
                        showCancelButton: true,
                        cancelButtonText: 'Tutup',
                        confirmButtonText: '<i class="fa-solid fa-print"></i> Cetak Laporan'
                    }).then((res) => { if (res.isConfirmed) window.print(); });
                }

            } catch (error) {
                Swal.fire('Koneksi Gagal', 'Gagal menghubungi Server AI di AWS.', 'error');
            } finally {
                // Kembalikan tombol ke keadaan semula
                btnSubmit.innerHTML = originalBtnHtml;
                btnSubmit.disabled = false;
                btnSubmit.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });
    </script>
</body>
</html>
