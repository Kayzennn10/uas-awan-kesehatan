name: CI/CD Pipeline Backend AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Check out repository kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Syntax Check
        run: |
          python -m py_compile main.py

  dockerize-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository kode
        uses: actions/checkout@v3

        # --- TAMBAHKAN BLOK INI UNTUK MEMBERSIHKAN DISK ---
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h


      - name: Login ke Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest

      # Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-frontend:latest




  deploy-to-aws:
    needs: dockerize-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Remote di AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            # 1. Masuk ke folder proyek
            cd uas-awan-kesehatan
            
            # 2. Update kode terbaru dari GitHub
            git pull origin main
            
            # 3. Login Docker
            sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            
            # 4. Hentikan container lama
            sudo docker compose down
            
            # 5. Ambil image terbaru
            sudo docker compose pull
            
            # 6. Jalankan kembali dengan konfigurasi baru
            sudo docker compose up -d --build