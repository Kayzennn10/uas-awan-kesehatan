name: CI/CD Pipeline Backend AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Syntax Check
        run: |
          python -m py_compile main.py

  dockerize-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository kode
        uses: actions/checkout@v3

      - name: Login ke Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest .

      - name: Push Image ke Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest

  deploy-to-aws:
    needs: dockerize-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Remote di AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            sudo docker stop awan-backend-container || true
            sudo docker rm awan-backend-container || true
            
            sudo kill -9 $(sudo lsof -t -i:8000) || true
            sudo fuser -k 8000/tcp || true

            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest
            sudo docker run -d --name awan-backend-container -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/awan-kesehatan-backend:latest